name: asha-testing public contracts

on:
  pull_request:
  push:
    branches: [main]

jobs:
  public-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout asha-testing
        uses: actions/checkout@v4
        with:
          path: asha-testing
      - name: Checkout ASHA engine sibling for file dependencies
        uses: actions/checkout@v4
        with:
          repository: FuzzySlipper/asha-engine
          path: asha-engine
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install pnpm for ASHA workspace links
        run: npm install -g pnpm
      - name: Install ASHA TypeScript workspace dependencies
        working-directory: asha-engine/ts
        run: pnpm install --frozen-lockfile
      - name: Install asha-testing dependencies
        working-directory: asha-testing
        run: npm ci
      - name: Run boundary and synthetic public-contract checks
        working-directory: asha-testing
        run: npm test
